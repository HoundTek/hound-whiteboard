<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hound Whiteboard Debug</title>
    <style>
      :root {
        --bg0: #ffffff;
        --fg0: #333333;
      }
      body {
        margin: 0;
        background-color: var(--bg0);
        color: var(--fg0);
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        font-family: sans-serif;
      }
      #debug-panel {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.9);
        color: #0f0;
        padding: 20px;
        overflow: auto;
        z-index: 2000;
        display: none;
        white-space: pre-wrap;
        font-family: monospace;
      }
      #app {
        height: 100%;
        width: 100%;
      }
      #loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: var(--bg0);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      #loading-status {
        text-align: center;
        padding: 20px;
      }
      .loading-step {
        margin: 5px 0;
        font-size: 14px;
      }
      .loading-success { color: #008000; }
      .loading-error { color: #ff0000; }
    </style>
  </head>
  <body>
    <div id="loading-overlay">
      <div id="loading-status">
        <h2>Loading Whiteboard Demo...</h2>
        <div id="loading-steps"></div>
      </div>
    </div>

    <div id="app">
      <canvas id="app-foreground-layer"></canvas>
    </div>

    <div id="debug-panel"></div>

    <script>
      const debugPanel = document.getElementById('debug-panel');
      const logs = [];

      window.debugLog = function(msg) {
        const timestamp = new Date().toISOString().substr(11, 12);
        const logLine = `[${timestamp}] ${msg}`;
        logs.push(logLine);
        debugPanel.textContent = logs.join('\n');
        console.log(msg);
      };

      window.showDebug = function() {
        debugPanel.style.display = 'block';
      };

      window.hideDebug = function() {
        debugPanel.style.display = 'none';
      };

      window.onerror = function(message, source, lineno, colno, error) {
        debugLog(`[ERROR] ${message} (${source}:${lineno})`);
        if (error && error.stack) {
          debugLog(error.stack);
        }
        return true;
      };

      window.addEventListener('unhandledrejection', function(event) {
        debugLog(`[UNHANDLED] ${event.reason}`);
      });
    </script>

    <script type="module">
      const loadingSteps = document.getElementById('loading-steps');
      let stepNum = 0;
      debugLog('Script module started');

      const addStep = (text, isError = false) => {
        stepNum++;
        const div = document.createElement('div');
        div.className = `loading-step ${isError ? 'loading-error' : 'loading-success'}`;
        div.textContent = `[${stepNum}] ${text}`;
        loadingSteps.appendChild(div);
        debugLog(`[${stepNum}] ${text}`);
      };

      const hideLoading = () => {
        document.getElementById('loading-overlay').style.display = 'none';
        debugLog('Loading overlay hidden');
      };

      try {
        addStep('Importing modules...');
        debugLog('Starting module imports...');

        const [mathModule, boardModule, demoModule] = await Promise.all([
          import('/core/utils/math.js'),
          import('/core/components/board.js'),
          import('/templates/demo/whiteboard-demo.js'),
        ]);

        debugLog('All modules imported successfully');
        addStep('✓ All modules imported');

        const { Vector } = mathModule;
        const { BOARD_PERSISTENCE_MODES, Board } = boardModule;
        const { configureWhiteboardDemo, DEMO_KEYBOARD_INPUT_CODES } = demoModule;

        debugLog('Creating board...');
        addStep('Creating board...');

        const board = new Board({
          persistenceMode: BOARD_PERSISTENCE_MODES.MEMORY,
        });
        board.width = window.innerWidth;
        board.height = window.innerHeight;
        debugLog(`Board created: ${board.width}x${board.height}`);

        addStep('Creating monitor...');
        debugLog('Creating monitor...');

        const foregroundLayer = document.getElementById("app-foreground-layer");
        debugLog(`Foreground layer element: ${foregroundLayer.tagName}`);

        const monitor = board.createMonitor(
          foregroundLayer,
          { width: window.innerWidth, height: window.innerHeight },
          "monitor",
        );
        debugLog(`Monitor created: monitorId="${monitor.monitorId}"`);
        debugLog(`Monitor canvas: ${monitor.canvas ? monitor.canvas.tagName : 'NULL'}`);
        debugLog(`Monitor rootElement: ${monitor.rootElement ? monitor.rootElement.tagName : 'NULL'}`);

        monitor.zoom = 1.0;
        monitor.origin = new Vector(0, 0);

        const canvasElement = monitor.canvas;
        if (canvasElement) {
          canvasElement.tabIndex = 0;
          canvasElement.style.outline = 'none';
          debugLog('Canvas configured with tabIndex=0');
        } else {
          debugLog('ERROR: monitor.canvas is NULL!');
        }

        addStep('Configuring demo...');
        debugLog('Calling configureWhiteboardDemo...');

        const demoResult = configureWhiteboardDemo(board, monitor, {});
        debugLog(`configureWhiteboardDemo returned: ${JSON.stringify(Object.keys(demoResult))}`);

        addStep('Setting up resize handler...');
        debugLog('Setting up resize handler...');

        const resizeMonitor = () => {
          const width = window.innerWidth;
          const height = window.innerHeight;
          debugLog(`Resize: ${width}x${height}`);
          monitor.rootElement.style.width = `${width}px`;
          monitor.rootElement.style.height = `${height}px`;
          monitor.resizeRenderLayers(width, height);
        };
        resizeMonitor();
        window.addEventListener("resize", resizeMonitor);

        addStep('Setting up mouse events...');
        debugLog('Setting up mouse events...');

        const emitMousePacket = (event) => {
          debugLog(`Mouse event: ${event.type} at (${event.clientX}, ${event.clientY}) target=${event.target.tagName}`);
          const signals = [];
          if (event.type === "mousedown" || event.type === "mousemove" || event.type === "mouseup") {
            const worldPosition = monitor.screenToWorld(new Vector(event.clientX, event.clientY));
            if (!worldPosition) {
              debugLog('screenToWorld returned null!');
              return;
            }
            debugLog(`World position: ${worldPosition.toString()}`);
            signals.push({
              type: "position",
              context: {
                value: worldPosition,
                button: event.button,
                buttons: event.buttons,
                domEvent: event.type,
                ctrlKey: Boolean(event.ctrlKey),
                shiftKey: Boolean(event.shiftKey),
                altKey: Boolean(event.altKey),
                metaKey: Boolean(event.metaKey),
              },
            });
          }
          if (event.type === "mouseup") {
            signals.push({ type: "end", context: { button: event.button, buttons: event.buttons, domEvent: event.type } });
          }
          if (event.type === "mouseleave") {
            signals.push({ type: "cancel", context: { buttons: event.buttons, domEvent: event.type } });
          }
          if (signals.length > 0) {
            const route = `/${monitor.monitorId}/mouse`;
            debugLog(`Emitting to ${route}: ${JSON.stringify(signals.map(s => s.type))}`);
            board.signalsEventBus.emit("input", {
              to: route,
              signals,
            });
          }
        };

        if (canvasElement) {
          canvasElement.addEventListener("mousedown", emitMousePacket);
          canvasElement.addEventListener("mousemove", emitMousePacket);
          canvasElement.addEventListener("mouseup", emitMousePacket);
          canvasElement.addEventListener("mouseleave", emitMousePacket);
          canvasElement.addEventListener("contextmenu", (e) => { e.preventDefault(); debugLog('Context menu prevented'); });
          debugLog('Mouse events attached to canvas');
        }

        window.addEventListener("mouseup", emitMousePacket);
        debugLog('Mouseup attached to window');

        addStep('Setting up keyboard events...');
        debugLog('Setting up keyboard events...');

        const keyboardInputCodes = new Set(DEMO_KEYBOARD_INPUT_CODES);
        debugLog(`Keyboard codes to handle: ${[...keyboardInputCodes].join(', ')}`);

        const emitKeyboardPacket = (event) => {
          debugLog(`Keyboard event: ${event.type} key=${event.key} code=${event.code} target=${event.target.tagName}`);
          if (!keyboardInputCodes.has(event.code)) {
            debugLog(`Code ${event.code} not in handled set, ignoring`);
            return;
          }
          event.preventDefault();
          const route = `/${monitor.monitorId}/keyboard`;
          debugLog(`Emitting to ${route}`);
          board.signalsEventBus.emit("input", {
            to: route,
            signals: [{
              type: event.type,
              context: {
                key: event.key,
                code: event.code,
                repeat: Boolean(event.repeat),
                ctrlKey: Boolean(event.ctrlKey),
                shiftKey: Boolean(event.shiftKey),
                altKey: Boolean(event.altKey),
                metaKey: Boolean(event.metaKey),
                domEvent: event.type,
              },
            }],
          });
        };

        const emitKeyboardCancelPacket = () => {
          debugLog('Keyboard cancel (blur)');
          board.signalsEventBus.emit("input", {
            to: `/${monitor.monitorId}/keyboard`,
            signals: [{ type: "cancel", context: { domEvent: "blur" } }],
          });
        };

        if (canvasElement) {
          canvasElement.addEventListener("mousedown", () => {
            debugLog('Canvas focus requested on mousedown');
            canvasElement.focus();
          });
          canvasElement.addEventListener("keydown", emitKeyboardPacket);
          canvasElement.addEventListener("keyup", emitKeyboardPacket);
          canvasElement.addEventListener("blur", emitKeyboardCancelPacket);
          debugLog('Keyboard events attached to canvas');
        }

        document.addEventListener("keydown", emitKeyboardPacket);
        document.addEventListener("keyup", emitKeyboardPacket);
        debugLog('Keyboard events attached to document');

        addStep('✓ Demo ready!');
        debugLog('=== DEMO READY ===');
        addStep('Press ~ to toggle debug | Left Click: Black stroke | Right Click: Red stroke | Space: Random circle | WASD: Move view');

        setTimeout(hideLoading, 500);

        document.addEventListener('keydown', (e) => {
          if (e.code === 'Backquote') {
            if (debugPanel.style.display === 'block') {
              hideDebug();
            } else {
              showDebug();
            }
          }
        });

      } catch (error) {
        debugLog(`[FATAL] ${error.message}`);
        if (error.stack) {
          debugLog(error.stack);
        }
        addStep(`❌ Error: ${error.message}`, true);
        console.error('Fatal error:', error);
      }
    </script>
  </body>
</html>
