<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hound Whiteboard</title>
    <style>
      :root {
        --bg0: #ffffff;
        --bg1: #f0f0f0;
        --fg0: #333333;
        --fg1: #666666;
        --fs5: 14px;
      }
      * {
        user-select: none;
      }
      body {
        margin: 0;
        background-color: var(--bg0);
        color: var(--fg0);
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }
      #app {
        height: 100%;
        width: 100%;
      }
      #app-background-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      #app-texture-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      #app-foreground-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: var(--bg0);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        font-family: sans-serif;
      }
      #loading-status {
        text-align: center;
        padding: 20px;
      }
      .loading-step {
        margin: 5px 0;
        font-size: 14px;
      }
      .loading-success { color: #008000; }
      .loading-error { color: #ff0000; }
    </style>
  </head>
  <body>
    <div id="loading-overlay">
      <div id="loading-status">
        <h2>Loading Whiteboard Demo...</h2>
        <div id="loading-steps"></div>
      </div>
    </div>

    <div id="app">
      <img id="app-background-layer" />
      <div id="app-texture-layer"></div>
      <div id="app-foreground-layer"></div>
    </div>

    <script type="module">
      const loadingSteps = document.getElementById('loading-steps');
      let stepNum = 0;

      const addStep = (text, isError = false) => {
        stepNum++;
        const div = document.createElement('div');
        div.className = `loading-step ${isError ? 'loading-error' : 'loading-success'}`;
        div.textContent = `[${stepNum}] ${text}`;
        loadingSteps.appendChild(div);
        console.log(isError ? '[ERROR]' : '[INFO]', text);
      };

      const hideLoading = () => {
        document.getElementById('loading-overlay').style.display = 'none';
      };

      try {
        addStep('Importing modules...');

        const [mathModule, boardModule, demoModule] = await Promise.all([
          import('/core/utils/math.js'),
          import('/core/components/board.js'),
          import('/templates/demo/whiteboard-demo.js'),
        ]);

        addStep('✓ All modules imported');

        const { Vector } = mathModule;
        const { BOARD_PERSISTENCE_MODES, Board } = boardModule;
        const { configureWhiteboardDemo, DEMO_KEYBOARD_INPUT_CODES } = demoModule;

        addStep('Creating board...');
        const board = new Board({
          persistenceMode: BOARD_PERSISTENCE_MODES.MEMORY,
        });
        board.width = 800;
        board.height = 600;

        addStep('Creating monitor...');
        const foregroundLayer = document.getElementById("app-foreground-layer");
        const monitor = board.createMonitor(
          foregroundLayer,
          { width: window.innerWidth, height: window.innerHeight },
          "monitor",
        );
        monitor.zoom = 1.0;
        monitor.origin = new Vector(0, 0);
        monitor.canvas.tabIndex = 0;

        addStep('Configuring demo...');
        configureWhiteboardDemo(board, monitor, {});

        addStep('Setting up resize handler...');
        const resizeMonitor = () => {
          const width = window.innerWidth;
          const height = window.innerHeight;
          monitor.rootElement.style.width = `${width}px`;
          monitor.rootElement.style.height = `${height}px`;
          monitor.resizeRenderLayers(width, height);
        };
        resizeMonitor();
        window.addEventListener("resize", resizeMonitor);

        addStep('Setting up mouse events...');
        const emitMousePacket = (event) => {
          const signals = [];
          if (event.type === "mousedown" || event.type === "mousemove" || event.type === "mouseup") {
            const worldPosition = monitor.screenToWorld(new Vector(event.clientX, event.clientY));
            if (!worldPosition) return;
            signals.push({
              type: "position",
              context: {
                value: worldPosition,
                button: event.button,
                buttons: event.buttons,
                domEvent: event.type,
                ctrlKey: Boolean(event.ctrlKey),
                shiftKey: Boolean(event.shiftKey),
                altKey: Boolean(event.altKey),
                metaKey: Boolean(event.metaKey),
              },
            });
          }
          if (event.type === "mouseup") {
            signals.push({ type: "end", context: { button: event.button, buttons: event.buttons, domEvent: event.type } });
          }
          if (event.type === "mouseleave") {
            signals.push({ type: "cancel", context: { buttons: event.buttons, domEvent: event.type } });
          }
          if (signals.length > 0) {
            board.signalsEventBus.emit("input", {
              to: `/${monitor.monitorId}/mouse`,
              signals,
            });
          }
        };

        monitor.canvas.addEventListener("mousedown", emitMousePacket);
        monitor.canvas.addEventListener("mousemove", emitMousePacket);
        monitor.canvas.addEventListener("mouseup", emitMousePacket);
        monitor.canvas.addEventListener("mouseleave", emitMousePacket);
        monitor.canvas.addEventListener("contextmenu", (e) => e.preventDefault());

        addStep('Setting up keyboard events...');
        const keyboardInputCodes = new Set(DEMO_KEYBOARD_INPUT_CODES);
        const emitKeyboardPacket = (event) => {
          if (!keyboardInputCodes.has(event.code)) return;
          event.preventDefault();
          board.signalsEventBus.emit("input", {
            to: `/${monitor.monitorId}/keyboard`,
            signals: [{
              type: event.type,
              context: {
                key: event.key,
                code: event.code,
                repeat: Boolean(event.repeat),
                ctrlKey: Boolean(event.ctrlKey),
                shiftKey: Boolean(event.shiftKey),
                altKey: Boolean(event.altKey),
                metaKey: Boolean(event.metaKey),
                domEvent: event.type,
              },
            }],
          });
        };

        const emitKeyboardCancelPacket = () => {
          board.signalsEventBus.emit("input", {
            to: `/${monitor.monitorId}/keyboard`,
            signals: [{ type: "cancel", context: { domEvent: "blur" } }],
          });
        };

        monitor.canvas.addEventListener("mousedown", () => monitor.canvas.focus());
        monitor.canvas.addEventListener("keydown", emitKeyboardPacket);
        monitor.canvas.addEventListener("keyup", emitKeyboardPacket);
        monitor.canvas.addEventListener("blur", emitKeyboardCancelPacket);

        addStep('✓ Demo ready!');
        addStep('Left Click: Black stroke | Right Click: Red stroke | Space: Random circle | WASD: Move view');

        setTimeout(hideLoading, 500);

      } catch (error) {
        addStep(`❌ Error: ${error.message}`, true);
        console.error('Fatal error:', error);
      }
    </script>
  </body>
</html>
