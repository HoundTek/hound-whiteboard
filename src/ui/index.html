<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hound Whiteboard - Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #ffffff;
      }
      
      .container {
        text-align: center;
        padding: 40px;
      }
      
      .logo {
        font-size: 72px;
        margin-bottom: 20px;
        animation: pulse 2s ease-in-out infinite;
      }
      
      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }
      
      h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
        background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      .subtitle {
        color: #a0aec0;
        font-size: 1.1rem;
        margin-bottom: 30px;
      }
      
      .status {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
      }
      
      .status-item {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 12px 24px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #48bb78;
        animation: blink 1.5s ease-in-out infinite;
      }
      
      @keyframes blink {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      
      .version {
        position: fixed;
        bottom: 20px;
        right: 20px;
        color: #4a5568;
        font-size: 0.85rem;
      }
      
      .info-panel {
        margin-top: 40px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        max-width: 400px;
      }
      
      .info-panel h3 {
        margin-bottom: 15px;
        color: #e2e8f0;
      }
      
      .info-list {
        text-align: left;
        color: #a0aec0;
        font-size: 0.95rem;
      }
      
      .info-list li {
        margin-bottom: 8px;
        padding-left: 20px;
        position: relative;
      }
      
      .info-list li::before {
        content: '✓';
        position: absolute;
        left: 0;
        color: #48bb78;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">🎯</div>
      <h1>Hound Whiteboard</h1>
      <p class="subtitle">安全IO框架演示页面</p>
      
      <div class="status">
        <div class="status-item">
          <span class="status-dot"></span>
          <span>主进程运行中</span>
        </div>
        <div class="status-item">
          <span class="status-dot"></span>
          <span>安全模块已加载</span>
        </div>
        <div class="status-item">
          <span class="status-dot"></span>
          <span>IPC通道就绪</span>
        </div>
      </div>
      
      <div class="info-panel">
        <h3>安全特性</h3>
        <ul class="info-list">
          <li>符号链接防护</li>
          <li>动态权限管理</li>
          <li>Capability安全模型</li>
          <li>窗口级隔离</li>
          <li>审计日志系统</li>
        </ul>
      </div>
    </div>
    
    <div class="version">v1.0.0</div>
    
    <script>
      // 监听安全初始化消息
      window.electronAPI?.on('security:init', (data) => {
        console.log('安全初始化完成:', data);
      });
      
      // 测试IPC通信
      async function testIPC() {
        try {
          const dirs = await window.electronAPI?.invoke('storage:get-directories');
          console.log('安全目录:', dirs);
        } catch (err) {
          console.warn('IPC测试失败:', err);
        }
      }
      
      // 页面加载完成后测试IPC
      document.addEventListener('DOMContentLoaded', () => {
        testIPC();
      });
    </script>
  </body>
</html>
