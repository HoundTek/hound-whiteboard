<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hound Whiteboard - 组件演示</title>
    <link rel="stylesheet" href="./style.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <!-- 结构组件 -->
    <script src="./components/DynamicRowList.js"></script>
    <script src="./components/DynamicColumnList.js"></script>
    <script src="./components/DynamicGrid.js"></script>
    <script src="./components/ResponsiveSplitLayout.js"></script>
    <script src="./components/Pagination.js"></script>
    <script src="./components/FloatingCapsule.js"></script>

    <!-- 模板组件 -->
    <script src="./components/Text.js"></script>
    <script src="./components/Icon.js"></script>
    <script src="./components/DisplayBox.js"></script>
    <script src="./components/IconWithText.js"></script>
    <script src="./components/DisplayBoxWithText.js"></script>
    <script src="./components/MenuButton.js"></script>
    <script src="./components/FloatingCapsuleSwitcher.js"></script>

    <!-- 应用组件 -->
    <script src="./App.js"></script>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(window.App));
      });
    </script>
  </body>
</html>
