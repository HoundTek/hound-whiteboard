<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hound Whiteboard - React UI</title>
    <link rel="stylesheet" href="./style.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <div id="scroll-indicator"></div>
    
    <script src="./utils/fileUtils.js"></script>
    <script src="./themeManager.js"></script>
    <script src="./localeManager.js"></script>
    <script src="./userManager.js"></script>
    <script src="./utils/layoutUtils.js"></script>
    <script src="./utils/scrollIndicator.js"></script>
    <script src="./utils/tabUtils.js"></script>
    <script src="./utils/animationUtils.js"></script>
    <script src="./components/Breadcrumb.js"></script>
    <script src="./pages/Page1.js"></script>
    <script src="./pages/Page2.js"></script>
    <script src="./pages/Page3.js"></script>
    <script src="./pages/Page4.js"></script>
    <script src="./pages/AppearanceSubpage.js"></script>
    <script src="./pages/LanguageSubpage.js"></script>
    <script src="./App.js"></script>
    
    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        // Load user
        await userManager.loadUser('default');
        userManager.updateLastLogin();
        
        // Get settings from user profile
        const settings = {
          theme: userManager.getSetting('theme') || 'default',
          icons: userManager.getSetting('iconPack') || 'default',
          locale: userManager.getSetting('locale') || 'zh-CN'
        };
        
        // Load theme, icons and locale
        await themeManager.loadTheme(settings.theme);
        await themeManager.loadIcons(settings.icons);
        await localeManager.loadLocale(settings.locale);
        
        // Render app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
      });
    </script>
  </body>
</html>
